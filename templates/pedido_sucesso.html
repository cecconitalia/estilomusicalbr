<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado - Estilo Musical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card text-center shadow">
            <div class="card-header bg-success text-white">
                <h1><i class="bi bi-check-circle"></i> Pedido Confirmado!</h1>
            </div>
            <div class="card-body">
                <p class="lead">Seu pedido foi processado com sucesso</p>
                <div class="alert alert-success">
                    <h4>Número do Pedido: #{{ pedido.id }}</h4>
                    <p>Data: {{ pedido.data_pedido.strftime('%d/%m/%Y %H:%M') }}</p>
                    <p>Total: {{ pedido.total|brl }}</p>
                </div>
                <a href="{{ url_for('index') }}" class="btn btn-primary">
                    <i class="bi bi-house"></i> Voltar à Página Inicial
                </a>
            </div>
        </div>
    </div>
</body>
</html>
